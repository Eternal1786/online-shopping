<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal | Seller Dashboard</title>
    <style>
        :root { --blue: #3b82f6; --bg: #020617; --card: #1e293b; --gold: #fbbf24; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: #0f172a; height: 100vh; padding: 20px; border-right: 1px solid #1e293b; position: fixed; }
        .logo { font-size: 22px; font-weight: 900; color: var(--blue); margin-bottom: 40px; }
        .menu-item { padding: 12px; margin-bottom: 10px; cursor: pointer; border-radius: 8px; transition: 0.3s; color: #94a3b8; }
        .menu-item:hover, .menu-item.active { background: var(--blue); color: white; }
        .vip-badge { background: var(--gold); color: black; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 5px; }

        /* Main Content */
        .main { margin-left: 290px; padding: 40px; width: 100%; }
        .stats { display: flex; gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; flex: 1; border: 1px solid #334155; }
        
        /* Product Section */
        .btn-add { background: var(--blue); color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-vip { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">ETERNAL</div>
    <div class="menu-item active">🏠 Dashboard</div>
    <div class="menu-item">📦 Products</div>
    <div class="menu-item">⚡ Alibaba Sync <span class="vip-badge">VIP</span></div>
    <div class="menu-item">📊 Analytics</div>
    <div class="menu-item" style="margin-top: 50px; color: var(--gold);">💎 Upgrade to VIP</div>
</div>

<div class="main">
    <h1>Xoş Gəldin, <span id="user-display">Seller</span>!</h1>
    
    <div class="stats">
        <div class="stat-card">
            <div style="color: #94a3b8;">Total Sales</div>
            <div style="font-size: 24px; font-weight: bold;">$0.00</div>
        </div>
        <div class="stat-card">
            <div style="color: #94a3b8;">Active Products</div>
            <div style="font-size: 24px; font-weight: bold;">0 / 50</div>
        </div>
        <div class="stat-card">
            <div style="color: #94a3b8;">Store Rating</div>
            <div style="font-size: 24px; font-weight: bold;">N/A</div>
        </div>
    </div>

    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h2>Məhsul İdarəetməsi</h2>
        <div>
            <button class="btn-vip">⚡ VIP Sync</button>
            <button class="btn-add">+ Yeni Məhsul</button>
        </div>
    </div>

    <div style="margin-top: 20px; background: var(--card); padding: 40px; border-radius: 15px; text-align: center; border: 1px dashed #475569;">
        <p style="color: #94a3b8;">Hələ ki məhsulunuz yoxdur. Satışa başlamaq üçün ilk məhsulunuzu əlavə edin.</p>
    </div>
</div>

<script>
    // Qeydiyyatdan gələn məlumatı bura çıxarırıq
    const userEmail = localStorage.getItem('userEmail') || "User";
    document.getElementById('user-display').innerText = userEmail.split('@')[0];
</script>

</body>
</html>
