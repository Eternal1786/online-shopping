<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eternal Dashboard</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<style>
:root { --blue:#3b82f6; --bg:#020617; --card:#0f172a; --border:#1e293b; --text:#f8fafc; }
body{margin:0; font-family:'Inter',sans-serif; background:var(--bg); color:var(--text);}
nav{background:rgba(15,23,42,0.9); padding:1rem 5%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border);}
.logo{font-size:1.5rem; font-weight:800; color:var(--blue); text-decoration:none;}
.nav-right{display:flex; gap:10px; align-items:center;}
.btn{padding:10px 20px; border-radius:8px; font-weight:600; cursor:pointer; border:none; transition:0.3s;}
.btn-outline{background:transparent; color:white; border:1px solid var(--blue);}
.btn-primary{background:var(--blue); color:white;}
.container{padding:20px 5%;}
.card{background:var(--card); padding:20px; border-radius:15px; margin-bottom:20px; border:1px solid var(--border);}
h2{margin-top:0;}
input, select, textarea{width:100%; padding:10px; margin:5px 0 15px 0; border-radius:10px; background:#020617; border:1px solid var(--border); color:white; box-sizing:border-box;}
table{width:100%; border-collapse:collapse; margin-top:20px;}
th, td{padding:10px; border-bottom:1px solid #1e293b; text-align:left;}
th{color:var(--blue);}
</style>
</head>
<body>

<nav>
<a href="#" class="logo">ETERNAL Dashboard</a>
<div class="nav-right">
<select onchange="updateLanguage(this.value)" id="langSelect" style="background:#0f172a; color:white; border:1px solid #1e293b; padding:5px; border-radius:5px;">
<option value="en">EN</option>
<option value="az">AZ</option>
<option value="tr">TR</option>
<option value="ru">RU</option>
<option value="ar">AR</option>
<option value="zh">CN</option>
</select>
<button class="btn btn-outline" onclick="logout()">Logout</button>
</div>
</nav>

<div class="container">
<h2 id="welcomeMsg">Welcome to your dashboard!</h2>

<div id="vipCard" class="card">
<h3>VIP Section</h3>
<p>Payoneer / Premium Features go here.</p>
</div>

<div id="addProductCard" class="card">
<h3>Add Product / Sales</h3>
<input type="text" id="productName" placeholder="Product Name">
<input type="number" id="productPrice" placeholder="Price">
<textarea id="productDesc" placeholder="Description"></textarea>
<select id="productType">
<option value="dropshipping">Dropshipping</option>
<option value="sale">Sale</option>
</select>
<button class="btn btn-primary" onclick="addProduct()">Add Product</button>
</div>

<div id="productsList" class="card">
<h3>Your Products</h3>
<table>
<thead><tr><th>Name</th><th>Price</th><th>Type</th></tr></thead>
<tbody id="productsTable"></tbody>
</table>
</div>
</div>

<script>
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID",
appId: "YOUR_APP_ID"
};
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();
db.enablePersistence().catch(()=>{});

let curLang='en';
const langData={
en:{welcome:"Welcome to your dashboard!"},
az:{welcome:"Dashboard-a xoş gəldiniz!"},
tr:{welcome:"Dashboard'a hoş geldiniz!"},
ru:{welcome:"Добро пожаловать в панель!"},
ar:{welcome:"مرحبًا بك في لوحة التحكم!"},
zh:{welcome:"欢迎来到仪表板！"}
};

auth.onAuthStateChanged(user=>{
if(!user) window.location.href="index.html";
else{
document.getElementById("welcomeMsg").innerText=langData[curLang].welcome+" "+(user.displayName||"");
loadProducts();
}
});

function logout(){auth.signOut().then(()=>window.location.href="index.html");}

function updateLanguage(lang){curLang=lang; document.getElementById("welcomeMsg").innerText=langData[curLang].welcome;}

function addProduct(){
const name=document.getElementById("productName").value;
const price=document.getElementById("productPrice").value;
const desc=document.getElementById("productDesc").value;
const type=document.getElementById("productType").value;
if(!name||!price){alert("Fill required fields"); return;}
const uid=auth.currentUser.uid;
db.collection("users").doc(uid).collection("products").add({name,price,desc,type,timestamp:firebase.firestore.FieldValue.serverTimestamp()})
.then(()=>{alert("Product added"); document.getElementById("productName").value=""; document.getElementById("productPrice").value=""; document.getElementById("productDesc").value=""; loadProducts();});
}

function loadProducts(){
const uid=auth.currentUser.uid;
const table=document.getElementById("productsTable");
table.innerHTML="";
db.collection("users").doc(uid).collection("products").orderBy("timestamp","desc").get().then(snapshot=>{
snapshot.forEach(doc=>{
const p=doc.data();
const row=document.createElement("tr");
row.innerHTML=`<td>${p.name}</td><td>${p.price}</td><td>${p.type}</td>`;
table.appendChild(row);
});
});
}
</script>
</body>
</html>
