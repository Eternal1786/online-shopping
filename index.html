<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eternal | Global Dropshipping Network</title>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<style>
:root { --blue: #3b82f6; --bg: #020617; --card: #0f172a; --border: #1e293b; --text: #f8fafc; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
nav { background: rgba(15,23,42,0.9); backdrop-filter: blur(12px); padding: 1rem 5%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:1000; }
.logo { font-size:1.5rem; font-weight:800; color:var(--blue); text-decoration:none; letter-spacing:2px; }
.nav-right { display:flex; gap:10px; align-items:center; }
.btn { padding:10px 20px; border-radius:8px; font-weight:600; cursor:pointer; border:none; transition:.3s; }
.btn-outline { background:transparent; color:white; border:1px solid var(--blue); }
.btn-primary { background:var(--blue); color:white; }
.hero { height:80vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:0 20px; background:radial-gradient(circle at center, rgba(59,130,246,0.1), transparent 70%); }
.hero h1 { font-size:3rem; margin-bottom:15px; background: linear-gradient(to right,#3b82f6,#93c5fd); -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:fadeInUp 1s ease; }
.hero p { color:#94a3b8; max-width:600px; margin-bottom:30px; font-size:1.1rem; }
.modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center; padding:20px; }
.modal-content { background:var(--card); width:100%; max-width:450px; padding:2rem; border-radius:20px; border:1px solid var(--border); position:relative; max-height:90vh; overflow-y:auto; }
.input-group { margin-bottom:1rem; text-align:left; position:relative; }
label { display:block; font-size:0.8rem; color:#94a3b8; margin-bottom:5px; }
input,select { width:100%; padding:12px; background:#020617; border:1px solid var(--border); border-radius:10px; color:white; box-sizing:border-box; }
.eye-btn { position:absolute; right:12px; top:32px; cursor:pointer; opacity:.6; }
#dashboard{display:none;padding:20px;}
.vip-plan{border:1px solid var(--blue);padding:15px;margin:10px 0;border-radius:10px;}
@keyframes fadeInUp { from { opacity:0; transform:translateY(20px);} to { opacity:1; transform:translateY(0);} }
</style>
</head>
<body>

<nav>
<a href="#" class="logo">ETERNAL</a>
<div class="nav-right">
<select onchange="updateLanguage(this.value)" id="langSelect" style="background:#0f172a;color:white;border:1px solid #1e293b;padding:5px;border-radius:5px;">
<option value="en">EN</option>
<option value="az" selected>AZ</option>
<option value="tr">TR</option>
<option value="ru">RU</option>
<option value="zh">CN</option>
<option value="ar">AR</option>
</select>
<button class="btn btn-outline" id="navLogin" onclick="openModal('login')">Login</button>
<button class="btn btn-primary" id="navSignup" onclick="openModal('signup')">Join Now</button>
</div>
</nav>

<section class="hero">
<h1 id="hTitle">Global Dropshipping <br> Future is Eternal</h1>
<p id="hDesc">Expand your business across borders.</p>
<div style="display:flex; gap:15px;">
<button class="btn btn-primary" id="heroBtn" onclick="openModal('signup')">Get Started</button>
</div>
</section>

<div id="dashboard">
<h2>Dashboard</h2>
<p>Salam, <span id="userName"></span>! Telefon təsdiqlənməyib: <span id="phoneStatus">✖</span></p>
<div id="phoneVerifyDiv">
<label>Telefon Kodunu Daxil Et (demo: 1234)</label>
<input type="text" id="phoneCode" placeholder="1234">
<button onclick="verifyPhone()" class="btn btn-primary" style="margin-top:10px;">Təsdiq Et</button>
</div>
<h3>VIP Planlar</h3>
<div id="vipPlans"></div>
</div>

<div id="authModal" class="modal">
<div class="modal-content">
<span onclick="closeModal()" style="position:absolute; right:20px; top:10px; cursor:pointer; font-size:24px;">&times;</span>
<h2 id="mTitle" style="text-align:center;">Account</h2>
<div id="formBody"></div>
<button class="btn btn-primary" id="mActionBtn" onclick="handleSubmit()" style="width:100%; padding:14px; margin-top:10px;">Continue</button>
</div>
</div>

<script>
// Firebase config
const firebaseConfig = {
    apiKey: "",
    authDomain: "eternal-global.firebaseapp.com",
    projectId: "sonsuz-kuresel",
    appId: "1:1028365979555:web:ff7100da1ed4c9d66ad416"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// LocalStorage fallback (offline)
let users = JSON.parse(localStorage.getItem('users')) || [];
let currentUser = null;
let curLang = 'az';
let currentMode = 'login';

function updateLanguage(lang){ curLang=lang; if(document.getElementById('authModal').style.display==='flex') renderForm(); }
function openModal(mode){ currentMode=mode; document.getElementById('authModal').style.display='flex'; renderForm(); }
function closeModal(){ document.getElementById('authModal').style.display='none'; }
function togglePass(){ const p=document.getElementById('l_pass'); if(p)p.type=p.type==='password'?'text':'password'; }

function renderForm(){
const body=document.getElementById('formBody');
body.innerHTML = currentMode==='login'?
`<div class="input-group"><label>Email</label><input type="email" id="l_email"></div>
<div class="input-group"><label>Password</label><input type="password" id="l_pass"><span class="eye-btn" onclick="togglePass()">👁️</span></div>
<a style="font-size:0.8rem;color:#3b82f6;cursor:pointer;" onclick="handleForgot()">Forgot Password?</a>`:
`<div class="input-group"><label>Full Name</label><input type="text" id="l_name"></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><div class="input-group"><label>Country</label><input type="text" id="l_country"></div>
<div class="input-group"><label>City</label><input type="text" id="l_city"></div></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><div class="input-group"><label>Gender</label><select id="l_gender"><option value="m">Male</option><option value="f">Female</option></select></div>
<div class="input-group"><label>Birth Date</label><input type="date" id="l_dob"></div></div>
<div class="input-group"><label>Email</label><input type="email" id="l_email"></div>
<div class="input-group"><label>Password</label><input type="password" id="l_pass"><span class="eye-btn" onclick="togglePass()">👁️</span></div>`;
}

function handleSubmit(){
const email=document.getElementById('l_email').value;
const pass=document.getElementById('l_pass').value;
if(!email||!pass){alert("Bütün xanaları doldurun!"); return;}
if(currentMode==='login'){
auth.signInWithEmailAndPassword(email, pass)
.then(() => { currentUser = {email}; showDashboard(); closeModal(); })
.catch(e=>alert(e.message));
}else{
auth.createUserWithEmailAndPassword(email, pass)
.then(() => { currentUser = {email, phoneVerified:false, VIP:false}; users.push(currentUser); localStorage.setItem('users',JSON.stringify(users)); showDashboard(); closeModal(); })
.catch(e=>alert(e.message));
}
}

function handleForgot(){
const email=prompt("Emailinizi daxil edin:");
if(email) auth.sendPasswordResetEmail(email).then(()=>alert("Link göndərildi!")).catch(e=>alert(e.message));
}

function showDashboard(){
document.querySelector('nav').style.display='none';
document.querySelector('.hero').style.display='none';
document.getElementById('dashboard').style.display='block';
document.getElementById('userName').innerText=currentUser.email;
updatePhoneStatus();
renderVIP();
}

function updatePhoneStatus(){
document.getElementById('phoneStatus').innerText=currentUser.phoneVerified?'✔':'✖';
document.getElementById('phoneVerifyDiv').style.display=currentUser.phoneVerified?'none':'block';
}

function verifyPhone(){
const code=document.getElementById('phoneCode').value;
if(code==='1234'){currentUser.phoneVerified=true; saveUser(); updatePhoneStatus(); alert('Telefon təsdiqləndi!');}
else alert('Kod səhvdir!');
}

function saveUser(){
users = users.map(u=>u.email===currentUser.email?currentUser:u);
localStorage.setItem('users',JSON.stringify(users));
}

const vipPlans=[
{name:"Gold",price:"$50"},
{name:"Platinum",price:"$100"},
{name:"Diamond",price:"$200"}
];

function renderVIP(){
const div=document.getElementById('vipPlans'); div.innerHTML='';
vipPlans.forEach(p=>{
const vipDiv=document.createElement('div'); vipDiv.className='vip-plan';
vipDiv.innerHTML=`<b>${p.name}</b> - ${p.price} <a href="https://payoneer.com/payment-link" target="_blank" class="btn btn-outline" style="margin-left:10px;">Pay Now</a>`;
div.appendChild(vipDiv);
});
}
</script>

</body>
</html>
