<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal | Global Business Hub</title>
    <style>
        :root { --blue: #3b82f6; --bg: #0f172a; --card: #1e293b; --green: #10b981; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; margin: 0; }
        
        /* Navigation */
        nav { background: var(--card); padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--blue); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .logo { font-size: 28px; font-weight: 900; color: var(--blue); letter-spacing: 3px; }
        .nav-btns .btn { padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; margin-left: 10px; transition: 0.3s; }
        .login-btn { background: transparent; color: white; border: 1px solid var(--blue) !important; }
        .reg-btn { background: var(--blue); color: white; }
        .reg-btn:hover { background: #2563eb; }

        /* Modal Structure */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); margin: 50px auto; padding: 40px; border: 1px solid var(--blue); width: 420px; border-radius: 25px; position: relative; box-shadow: 0 0 30px rgba(59, 130, 246, 0.3); }
        .close-btn { position: absolute; right: 25px; top: 20px; font-size: 28px; cursor: pointer; color: #94a3b8; }

        /* Tabs */
        .tabs { display: flex; margin-bottom: 25px; background: #0f172a; border-radius: 12px; padding: 5px; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; border-radius: 10px; transition: 0.3s; font-weight: 600; color: #64748b; }
        .tab.active { background: var(--blue); color: white; }

        /* Inputs */
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #334155; background: #020617; color: white; font-size: 15px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--blue); box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        
        .submit-btn { width: 100%; padding: 16px; background: var(--green); border: none; color: white; font-weight: 800; border-radius: 12px; cursor: pointer; font-size: 16px; margin-top: 20px; text-transform: uppercase; transition: 0.3s; }
        .submit-btn:hover { background: #059669; transform: translateY(-2px); }
        
        .footer-text { font-size: 12px; color: #94a3b8; text-align: center; margin-top: 20px; line-height: 1.6; }
    </style>
</head>
<body>

<nav>
    <div class="logo">ETERNAL</div>
    <div class="nav-btns">
        <button class="btn login-btn" onclick="openAuth('login')">Login</button>
        <button class="btn reg-btn" onclick="openAuth('signup')">Sign Up</button>
    </div>
</nav>

<header style="text-align:center; padding: 120px 20px; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);">
    <h1 style="font-size: 48px; margin-bottom: 15px;">E-Commerce Reimagined</h1>
    <p style="color: #94a3b8; font-size: 20px; max-width: 600px; margin: 0 auto;">Build, manage, and scale your global dropshipping business with AI-powered tools.</p>
</header>

<div id="authModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeAuth()">&times;</span>
        
        <div class="tabs" id="role-tabs">
            <div id="tab-buyer" class="tab active" onclick="setRole('buyer')">Buyer</div>
            <div id="tab-seller" class="tab" onclick="setRole('seller')">Seller</div>
        </div>

        <h2 id="modal-title" style="text-align: center; margin-bottom: 20px;">Create Account</h2>
        
        <div id="dynamic-fields">
            </div>

        <button class="submit-btn" onclick="submitAuth()">Continue</button>
        <p id="footer-note" class="footer-text">Join thousands of businesses worldwide.</p>
    </div>
</div>

<script>
    let currentRole = 'buyer'; 
    let currentMode = 'signup';

    function openAuth(mode) {
        currentMode = mode;
        document.getElementById('authModal').style.display = 'block';
        if(mode === 'login') {
            document.getElementById('role-tabs').style.display = 'none';
        } else {
            document.getElementById('role-tabs').style.display = 'flex';
        }
        updateUI();
    }

    function closeAuth() {
        document.getElementById('authModal').style.display = 'none';
    }

    function setRole(role) {
        currentRole = role;
        document.getElementById('tab-buyer').className = (role === 'buyer') ? 'tab active' : 'tab';
        document.getElementById('tab-seller').className = (role === 'seller') ? 'tab active' : 'tab';
        updateUI();
    }

    function updateUI() {
        const fields = document.getElementById('dynamic-fields');
        const title = document.getElementById('modal-title');
        const footer = document.getElementById('footer-note');

        if (currentMode === 'login') {
            title.innerText = "Welcome Back";
            footer.innerText = "Access your personal dashboard and orders.";
            fields.innerHTML = `
                <input type="email" placeholder="Gmail Address" class="form-group">
                <input type="password" placeholder="Password" class="form-group">
            `;
        } else {
            // SIGN UP MODE
            if (currentRole === 'seller') {
                title.innerText = "Seller Business Account";
                footer.innerHTML = "<b>Note:</b> Phone verification is required for the first withdrawal of $ funds.";
                fields.innerHTML = `
                    <div style="display: flex; gap: 10px;" class="form-group">
                        <input type="text" placeholder="First Name">
                        <input type="text" placeholder="Last Name">
                    </div>
                    <input type="text" placeholder="Market Name (Brand)" class="form-group">
                    <div style="display: flex; gap: 10px;" class="form-group">
                        <input type="text" placeholder="Country">
                        <input type="text" placeholder="City">
                    </div>
                    <select class="form-group">
                        <option value="">Store Category</option>
                        <option value="tech">Electronics & Tech</option>
                        <option value="fashion">Fashion & Apparel</option>
                        <option value="home">Home & Lifestyle</option>
                    </select>
                    <input type="email" placeholder="Gmail Address" class="form-group">
                    <input type="password" placeholder="Create Password (min. 6 chars)" class="form-group">
                `;
            } else {
                title.innerText = "New Buyer Account";
                footer.innerText = "Start shopping from global stores instantly.";
                fields.innerHTML = `
                    <input type="text" placeholder="Full Name" class="form-group">
                    <input type="email" placeholder="Gmail Address" class="form-group">
                    <input type="password" placeholder="Create Password" class="form-group">
                `;
            }
        }
    }

    function submitAuth() {
        alert("Registration Successful! Redirecting...");
        window.location.href = (currentRole === 'seller') ? "dashboard.html" : "index.html";
    }

    // Modal kənarına basanda bağlansın
    window.onclick = function(event) {
        if (event.target == document.getElementById('authModal')) closeAuth();
    }
</script>

</body>
</html>
