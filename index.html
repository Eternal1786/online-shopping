<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal | Global Commerce</title>
    <style>
        :root { --blue: #3b82f6; --bg: #020617; --card: #0f172a; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* Naviqasiya */
        nav { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 800; color: var(--blue); text-transform: uppercase; letter-spacing: 2px; }
        
        /* Modal Dizaynı */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; padding: 20px; overflow-y: auto; }
        .modal-content { background: var(--card); max-width: 450px; margin: 30px auto; padding: 30px; border-radius: 20px; border: 1px solid #334155; position: relative; }
        
        /* Form Elementləri */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { margin-bottom: 15px; position: relative; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #1e293b; background: #020617; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--blue); box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
        
        /* Düymələr */
        .btn-main { width: 100%; padding: 14px; background: var(--blue); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .eye-btn { position: absolute; right: 12px; top: 10px; cursor: pointer; font-size: 18px; }
        
        .lang-btn { background: #1e293b; color: white; border: 1px solid #334155; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <div class="logo">ETERNAL</div>
    <div style="display: flex; gap: 15px; align-items: center;">
        <select id="langSelect" onchange="translatePage(this.value)" class="lang-btn">
            <option value="az">AZ</option>
            <option value="en">EN</option>
            <option value="tr">TR</option>
            <option value="ru">RU</option>
        </select>
        <button onclick="openAuth('login')" style="background:transparent; color:white; border:none; cursor:pointer;" id="nav-login">Login</button>
        <button onclick="openAuth('signup')" class="btn-main" style="width:auto; padding:8px 20px;" id="nav-signup">Sign Up</button>
    </div>
</nav>

<div id="authModal" class="modal">
    <div class="modal-content">
        <span onclick="closeAuth()" style="position:absolute; right:20px; top:15px; cursor:pointer; font-size:24px;">&times;</span>
        <h2 id="m-title" style="text-align:center;">Qeydiyyat</h2>
        
        <div id="auth-form">
            </div>
        
        <button class="btn-main" onclick="processAuth()" id="m-btn">Davam Et</button>
    </div>
</div>

<script>
    const translations = {
        az: { login: "Giriş", signup: "Qeydiyyat", email: "Gmail Ünvanı", pass: "Şifrə", name: "Ad Soyad", country: "Ölkə", city: "Şəhər", gender: "Cinsiyyət", dob: "Doğum Tarixi", forgot: "Şifrəmi Unutdum", seller: "Satıcı", buyer: "Alıcı" },
        en: { login: "Login", signup: "Sign Up", email: "Email Address", pass: "Password", name: "Full Name", country: "Country", city: "City", gender: "Gender", dob: "Date of Birth", forgot: "Forgot Password?", seller: "Seller", buyer: "Buyer" },
        tr: { login: "Giriş", signup: "Kayıt Ol", email: "E-posta", pass: "Şifre", name: "Ad Soyad", country: "Ülke", city: "Şehir", gender: "Cinsiyet", dob: "Doğum Tarihi", forgot: "Şifremi Unuttum", seller: "Satıcı", buyer: "Alıcı" },
        ru: { login: "Вход", signup: "Регистрация", email: "Эл. почта", pass: "Пароль", name: "Имя Фамилия", country: "Страна", city: "Город", gender: "Пол", dob: "Дата рождения", forgot: "Забыли пароль?", seller: "Продавец", buyer: "Покупатель" }
    };

    let curLang = 'az';
    let curMode = 'signup';

    function translatePage(lang) {
        curLang = lang;
        document.getElementById('nav-login').innerText = translations[lang].login;
        document.getElementById('nav-signup').innerText = translations[lang].signup;
        if(document.getElementById('authModal').style.display === 'block') updateFields();
    }

    function openAuth(mode) {
        curMode = mode;
        document.getElementById('authModal').style.display = 'block';
        updateFields();
    }

    function closeAuth() { document.getElementById('authModal').style.display = 'none'; }

    function updateFields() {
        const f = document.getElementById('auth-form');
        const t = translations[curLang];
        document.getElementById('m-title').innerText = t[curMode];

        if(curMode === 'login') {
            f.innerHTML = `
                <input type="email" placeholder="${t.email}" class="form-group">
                <div class="form-group">
                    <input type="password" id="p1" placeholder="${t.pass}">
                    <span class="eye-btn" onclick="toggleView('p1')">👁️</span>
                </div>
                <p style="color:var(--blue); font-size:12px; text-align:right; cursor:pointer;">${t.forgot}</p>
            `;
        } else {
            f.innerHTML = `
                <input type="text" placeholder="${t.name}" class="form-group">
                <div class="grid-2 form-group">
                    <select><option>${t.country}</option><option>Azerbaijan</option><option>Turkey</option><option>USA</option></select>
                    <input type="text" placeholder="${t.city}">
                </div>
                <div class="grid-2 form-group">
                    <select><option>${t.gender}</option><option>Male</option><option>Female</option></select>
                    <input type="date" title="${t.dob}">
                </div>
                <input type="email" placeholder="${t.email}" class="form-group">
                <div class="form-group">
                    <input type="password" id="p2" placeholder="${t.pass}">
                    <span class="eye-btn" onclick="toggleView('p2')">👁️</span>
                </div>
            `;
        }
    }

    function toggleView(id) {
        const x = document.getElementById(id);
        x.type = x.type === "password" ? "text" : "password";
    }

    function processAuth() {
        alert(curLang === 'az' ? "Təsdiq kodu Gmail-ə göndərildi!" : "Verification code sent to Gmail!");
        // Bura gələcəkdə real OTP funksiyası qoşulacaq
    }
</script>

</body>
</html>
