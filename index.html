<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal | Global Dropshipping Network</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        :root { --blue: #3b82f6; --bg: #020617; --card: #0f172a; --border: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.5; }
        nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--blue); text-decoration: none; letter-spacing: 2px; }
        .nav-right { display: flex; gap: 15px; align-items: center; }
        .btn { padding: 10px 22px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; border: none; }
        .btn-outline { background: transparent; color: white; border: 1px solid var(--blue); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); width: 100%; max-width: 450px; padding: 2rem; border-radius: 24px; border: 1px solid var(--border); position: relative; text-align: center; }
        .input-group { margin-bottom: 1.2rem; text-align: left; }
        label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 5px; }
        input { width: 100%; padding: 12px 15px; background: #020617; border: 1px solid var(--border); border-radius: 10px; color: white; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">ETERNAL</a>
    <div class="nav-right">
        <select onchange="updateLanguage(this.value)" style="background: #0f172a; color: white; border: 1px solid #1e293b; padding: 5px; border-radius: 5px;">
            <option value="en">EN</option>
            <option value="az">AZ</option>
        </select>
        <button class="btn btn-outline" id="navLogin" onclick="openModal()">Login</button>
        <button class="btn btn-outline" id="navSignup" onclick="openModal()">Join Now</button>
    </div>
</nav>

<div id="authModal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal()" style="position:absolute; right:20px; top:10px; cursor:pointer; font-size:24px;">&times;</span>
        <h2 id="mTitle">Create Account</h2>
        <div id="formBody"></div>
        <button class="submit-btn" onclick="handleSignUp()" id="mActionBtn">Continue</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB_ZF8CnMf3-4sLhgKiTkf3InJN_TDRhLM",
        authDomain: "eternal-global.firebaseapp.com",
        projectId: "sonsuz-kuresel",
        appId: "1:1028365979555:web:ff7100da1ed4c9d66ad416"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const langData = {
        en: { navLogin: "Login", navSignup: "Join Now", title_s: "Create Account", email: "Email", pass: "Password", btn_s: "Sign Up", name: "Full Name" },
        az: { navLogin: "Giriş", navSignup: "Qeydiyyat", title_s: "Hesab Yaradın", email: "Gmail", pass: "Şifrə", btn_s: "Qeydiyyat", name: "Ad Soyad" }
    };

    let curLang = 'en';

    function updateLanguage(val) {
        curLang = val;
        document.getElementById('navLogin').innerText = langData[val].navLogin;
        document.getElementById('navSignup').innerText = langData[val].navSignup;
        if (document.getElementById('authModal').style.display === 'flex') renderForm();
    }

    function openModal() {
        document.getElementById('authModal').style.display = 'flex';
        renderForm();
    }

    function closeModal() {
        document.getElementById('authModal').style.display = 'none';
    }

    function renderForm() {
        const t = langData[curLang];
        document.getElementById('formBody').innerHTML = `
            <div class="input-group"><label>${t.name}</label><input type="text" id="l_name"></div>
            <div class="input-group"><label>${t.email}</label><input type="email" id="l_email"></div>
            <div class="input-group"><label>${t.pass}</label><input type="password" id="l_pass"></div>
        `;
        document.getElementById('mTitle').innerText = t.title_s;
        document.getElementById('mActionBtn').innerText = t.btn_s;
    }

    function handleSignUp() {
        const email = document.getElementById('l_email').value;
        const pass = document.getElementById('l_pass').value;
        if (!email || !pass) { alert("Xanaları doldurun!"); return; }

        auth.createUserWithEmailAndPassword(email, pass)
            .then(() => { alert("Uğurla qeydiyyat keçildi!"); closeModal(); })
            .catch((error) => { alert("Xəta: " + error.message); });
    }
</script>

</body>
</html>
