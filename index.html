<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal | Global Dropshipping</title>
    <style>
        :root { --blue: #3b82f6; --bg: #0f172a; --card: #1e293b; --green: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        
        nav { background: var(--card); padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--blue); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 26px; font-weight: 900; color: var(--blue); letter-spacing: 2px; }
        .nav-btns button { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; margin-left: 10px; transition: 0.3s; }
        .login-btn { background: transparent; color: white; border: 1px solid var(--blue) !important; }
        .reg-btn { background: var(--blue); color: white; }

        .hero { text-align: center; padding: 120px 20px; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); }
        .hero h1 { font-size: 50px; margin-bottom: 10px; color: white; }
        .hero p { color: #94a3b8; font-size: 20px; max-width: 700px; margin: 0 auto 30px; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); margin: 5% auto; padding: 35px; border: 1px solid var(--blue); width: 420px; border-radius: 25px; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: #94a3b8; }
        
        .tabs { display: flex; margin-bottom: 25px; background: #0f172a; border-radius: 12px; padding: 5px; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; border-radius: 10px; color: #64748b; font-weight: bold; transition: 0.3s; }
        .tab.active { background: var(--blue); color: white; }

        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #334155; background: #020617; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--blue); }
        .submit-btn { width: 100%; padding: 16px; background: var(--green); border: none; color: white; font-weight: bold; border-radius: 12px; cursor: pointer; margin-top: 10px; font-size: 16px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">ETERNAL</div>
    <div class="nav-btns">
        <button class="login-btn" onclick="openAuth('login')">Login</button>
        <button class="reg-btn" onclick="openAuth('signup')">Sign Up</button>
    </div>
</nav>

<div class="hero">
    <h1>E-Commerce Reimagined</h1>
    <p>Mağazanızı qurun, Alibaba məhsullarını tək kliklə inteqrasiya edin və satışa başlayın. İndi qeydiyyatdan keçmək tamamilə pulsuzdur!</p>
    <button class="reg-btn" style="padding: 15px 45px; font-size: 18px;" onclick="openAuth('signup')">Həmin An Başla (Free)</button>
</div>

<div id="authModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeAuth()">&times;</span>
        <div class="tabs" id="role-tabs">
            <div id="tab-buyer" class="tab active" onclick="setRole('buyer')">Buyer</div>
            <div id="tab-seller" class="tab" onclick="setRole('seller')">Seller</div>
        </div>
        <h2 id="modal-title" style="text-align: center; margin-bottom: 20px;">Create Account</h2>
        <div id="dynamic-fields"></div>
        <button class="submit-btn" onclick="submitAuth()">CONTINUE</button>
        <p id="footer-note" style="font-size: 11px; color: #94a3b8; text-align: center; margin-top: 15px;">Secure connection active.</p>
    </div>
</div>

<script>
    let currentRole = 'buyer'; 
    let currentMode = 'signup';

    function openAuth(mode) {
        currentMode = mode;
        document.getElementById('authModal').style.display = 'block';
        document.getElementById('role-tabs').style.display = (mode === 'login') ? 'none' : 'flex';
        updateUI();
    }

    function closeAuth() { document.getElementById('authModal').style.display = 'none'; }

    function setRole(role) {
        currentRole = role;
        document.getElementById('tab-buyer').className = (role === 'buyer') ? 'tab active' : 'tab';
        document.getElementById('tab-seller').className = (role === 'seller') ? 'tab active' : 'tab';
        updateUI();
    }

    function updateUI() {
        const fields = document.getElementById('dynamic-fields');
        const title = document.getElementById('modal-title');

        if (currentMode === 'login') {
            title.innerText = "Welcome Back";
            fields.innerHTML = `
                <input type="email" id="email" placeholder="Gmail Address" class="form-group">
                <input type="password" id="pass" placeholder="Password" class="form-group">
            `;
        } else {
            if (currentRole === 'seller') {
                title.innerText = "Seller Business Account";
                fields.
