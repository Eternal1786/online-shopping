<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal | Global Dropshipping</title>
    <style>
        :root { --blue: #3b82f6; --bg: #0f172a; --card: #1e293b; --green: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        
        /* Navbar */
        nav { background: var(--card); padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--blue); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 26px; font-weight: 900; color: var(--blue); letter-spacing: 2px; cursor: pointer; }
        .nav-btns button { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; margin-left: 10px; }
        .login-btn { background: transparent; color: white; border: 1px solid var(--blue) !important; }
        .reg-btn { background: var(--blue); color: white; }

        /* Hero */
        .hero { text-align: center; padding: 120px 20px; background: radial-gradient(circle, #1e293b 0%, #0f172a 100%); min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hero h1 { font-size: 55px; margin-bottom: 20px; font-weight: 900; }
        .hero p { color: #94a3b8; font-size: 20px; max-width: 700px; margin-bottom: 40px; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .modal-content { background: var(--card); margin: 50px auto; padding: 35px; border: 1px solid var(--blue); width: 420px; border-radius: 25px; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        .tabs { display: flex; margin-bottom: 25px; background: #0f172a; border-radius: 12px; padding: 5px; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; border-radius: 10px; color: #64748b; font-weight: bold; transition: 0.3s; }
        .tab.active { background: var(--blue); color: white; }

        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #334155; background: #020617; color: white; box-sizing: border-box; outline: none; font-size: 15px; }
        input:focus { border-color: var(--blue); }
        
        .submit-btn { width: 100%; padding: 18px; background: var(--green); border: none; color: white; font-weight: bold; border-radius: 12px; cursor: pointer; margin-top: 10px; font-size: 16px; transition: 0.3s; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); }
        
        .close { position: absolute; right: 25px; top: 20px; font-size: 28px; cursor: pointer; color: #94a3b8; line-height: 1; }
    </style>
</head>
<body>

<nav>
    <div class="logo">ETERNAL</div>
    <div class="nav-btns">
        <button class="login-btn" id="btn-login-nav">Login</button>
        <button class="reg-btn" id="btn-signup-nav">Sign Up</button>
    </div>
</nav>

<div class="hero">
    <h1>E-Commerce Reimagined</h1>
    <p>Mağazanızı qurun, Alibaba inteqrasiyası ilə satışa başlayın. İndi qeydiyyat tamamilə pulsuzdur!</p>
    <button class="reg-btn" style="padding: 18px 50px; font-size: 20px;" id="btn-hero-start">Həmin An Başla (Free)</button>
</div>

<div id="authModal" class="modal">
    <div class="modal-content">
        <span class="close" id="modal-close">&times;</span>
        
        <div id="role-tabs" class="tabs">
            <div id="tab-buyer" class="tab active">Buyer</div>
            <div id="tab-seller" class="tab">Seller</div>
        </div>

        <h2 id="modal-title" style="text-align: center; margin-bottom: 25px;">Create Account</h2>
        <div id="dynamic-fields"></div>
        <button class="submit-btn" id="btn-submit">CONTINUE</button>
    </div>
</div>

<script>
    // BÜTÜN BUTONLARI BURADA CANLANDIRIRIQ
    let currentRole = 'buyer'; 
    let currentMode = 'signup';

    const modal = document.getElementById('authModal');
    const fields = document.getElementById('dynamic-fields');
    const title = document.getElementById('modal-title');

    // Funksiyalar
    function openModal(mode) {
        currentMode = mode;
        modal.style.display = 'block';
        document.getElementById('role-tabs').style.display = (mode === 'login') ? 'none' : 'flex';
        updateUI();
    }

    function closeModal() { modal.style.display = 'none'; }

    function setRole(role) {
        currentRole = role;
        document.getElementById('tab-buyer').className = (role === 'buyer') ? 'tab active' : 'tab';
        document.getElementById('tab-seller').className = (role === 'seller') ? 'tab active' : 'tab';
        updateUI();
    }

    function updateUI() {
        if (currentMode === 'login') {
            title.innerText = "Welcome Back";
            fields.innerHTML = `
                <input type="email" id="email" placeholder="Gmail Address" class="form-group">
                <input type="password" id="pass" placeholder="Password" class="form-group">
            `;
        } else {
            if (currentRole === 'seller') {
                title.innerText = "Seller Account";
                fields.innerHTML = `
                    <div style="display:flex; gap:10px;" class="form-group">
                        <input type="text" placeholder="First Name"><input type="text" placeholder="Last Name">
                    </div>
                    <input type="text" placeholder="Market Name (Brand)" class="form-group">
                    <input type="email" id="email" placeholder="Gmail Address" class="form-group">
                    <input type="password" id="pass" placeholder="Password (min. 6 chars)" class="form-group">
                    <div style="font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:8px;">
                        <input type="checkbox" style="width:auto"> I agree to Eternal's Terms
                    </div>
                `;
            } else {
                title.innerText = "Buyer Account";
                fields.innerHTML = `
                    <input type="text" placeholder="Full Name" class="form-group">
                    <input type="email" id="email" placeholder="Gmail Address" class="form-group">
                    <input type="password" id="pass" placeholder="Password" class="form-group">
                `;
            }
        }
    }

    // EVENT LISTENERS (DÜYMƏLƏRƏ "CAN" VERƏN HİSSƏ)
    document.getElementById('btn-login-nav').addEventListener('click', () => openModal('login'));
    document.getElementById('btn-signup-nav').addEventListener('click', () => openModal('signup'));
    document.getElementById('btn-hero-start').addEventListener('click', () => openModal('signup'));
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('tab-buyer').addEventListener('click', () => setRole('buyer'));
    document.getElementById('tab-seller').addEventListener('click', () => setRole('seller'));

    document.getElementById('btn-submit').addEventListener('click', () => {
        const email = document.getElementById('email')?.value;
        if(!email) { alert("Xanaları doldurun!"); return; }
        alert("Təbriklər! Yönləndirilirsiniz...");
        window.location.href = (currentRole === 'seller') ? "dashboard.html" : "index.html";
    });

    // Kənara basanda bağlansın
    window.addEventListener('click', (e) => { if (e.target == modal) closeModal(); });
</script>

</body>
</html>
