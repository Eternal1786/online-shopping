<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal | Universal Trading</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --blue: #3b82f6; --bg: #0f172a; --card: #1e293b; --green: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; }
        nav { background: var(--card); padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--blue); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 26px; font-weight: 900; color: var(--blue); letter-spacing: 2px; }
        .nav-btns { display: flex; align-items: center; gap: 15px; }
        button { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; }
        .login-btn { background: transparent; color: white; border: 1px solid var(--blue) !important; }
        .reg-btn { background: var(--blue); color: white; }
        
        /* Modal */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .modal-content { background: var(--card); margin: 50px auto; padding: 30px; border: 1px solid var(--blue); width: 400px; border-radius: 20px; position: relative; }
        .tabs { display: flex; margin-bottom: 20px; background: #0f172a; border-radius: 10px; padding: 5px; }
        .tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; border-radius: 8px; color: #64748b; font-weight: bold; }
        .tab.active { background: var(--blue); color: white; }
        .form-group { margin-bottom: 15px; position: relative; }
        input, select { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #334155; background: #020617; color: white; box-sizing: border-box; outline: none; }
        .eye-icon { position: absolute; right: 15px; top: 12px; cursor: pointer; opacity: 0.6; }
        .submit-btn { width: 100%; padding: 16px; background: var(--green); color: white; border-radius: 12px; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">ETERNAL</div>
    <div class="nav-btns">
        <select onchange="console.log('Dil dəyişdi: ' + this.value)" style="background:transparent; color:white; border:1px solid #334155; padding:5px; border-radius:5px;">
            <option value="az">AZ</option>
            <option value="en">EN</option>
            <option value="tr">TR</option>
            <option value="ru">RU</option>
        </select>
        <button class="login-btn" onclick="openAuth('login')">Login</button>
        <button class="reg-btn" onclick="openAuth('signup')">Sign Up</button>
    </div>
</nav>

<div id="authModal" class="modal">
    <div class="modal-content">
        <span style="position:absolute; right:20px; top:15px; font-size:24px; cursor:pointer;" onclick="closeAuth()">&times;</span>
        <div id="role-tabs" class="tabs">
            <div id="tab-buyer" class="tab active" onclick="setRole('buyer')">Alıcı</div>
            <div id="tab-seller" class="tab" onclick="setRole('seller')">Satıcı</div>
        </div>
        <h2 id="modal-title" style="text-align: center; margin-bottom: 20px;">Hesab Yaradın</h2>
        <div id="dynamic-fields"></div>
        <button class="submit-btn" onclick="handleSubmit()">Davam Et</button>
    </div>
</div>

<div id="otpModal" class="modal">
    <div class="modal-content" style="text-align:center;">
        <h2>Təsdiq Kodu</h2>
        <p>Gmail-ə göndərilən 6 rəqəmli kodu daxil edin:</p>
        <input type="text" id="otp-input" placeholder="000000" maxlength="6" style="text-align:center; font-size:24px; letter-spacing:8px;">
        <button class="submit-btn" onclick="verifyOTP()">Təsdiqlə</button>
    </div>
</div>

<script>
    let currentRole = 'buyer'; 
    let currentMode = 'signup';

    function openAuth(mode) {
        currentMode = mode;
        document.getElementById('authModal').style.display = 'block';
        document.getElementById('role-tabs').style.display = (mode === 'login') ? 'none' : 'flex';
        updateUI();
    }

    function closeAuth() { document.getElementById('authModal').style.display = 'none'; }

    function setRole(role) {
        currentRole = role;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + role).classList.add('active');
        updateUI();
    }

    function updateUI() {
        const fields = document.getElementById('dynamic-fields');
        const title = document.getElementById('modal-title');

        if (currentMode === 'login') {
            title.innerText = "Xoş Gəldiniz";
            fields.innerHTML = `
                <input type="email" id="email" placeholder="Gmail ünvanı" class="form-group">
                <div class="form-group">
                    <input type="password" id="pass" placeholder="Şifrə">
                    <span class="eye-icon" onclick="togglePass()">👁️</span>
                </div>
                <p onclick="alert('Şifrə yeniləmə linki göndərildi!')" style="font-size:12px; color:#3b82f6; text-align:right; cursor:pointer;">Şifrəmi unutdum?</p>
            `;
        } else {
            title.innerText = (currentRole === 'seller' ? "Satıcı" : "Alıcı") + " Qeydiyyatı";
            fields.innerHTML = `
                <input type="text" placeholder="Ad və Soyad" class="form-group">
                <select id="gender" class="form-group">
                    <option value="" disabled selected>Cinsiyyətiniz</option>
                    <option value="kisi">Kişi</option>
                    <option value="qadin">Qadın</option>
                </select>
                <input type="email" id="email" placeholder="Gmail ünvanı" class="form-group">
                <div class="form-group">
                    <input type="password" id="pass" placeholder="Şifrə">
                    <span class="eye-icon" onclick="togglePass()">👁️</span>
                </div>
            `;
        }
    }

    function togglePass() {
        const p = document.getElementById('pass');
        p.type = p.type === "password" ? "text" : "password";
    }

    function handleSubmit() {
        if (currentMode === 'signup') {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('otpModal').style.display = 'block';
        } else {
            window.location.href = (currentRole === 'seller') ? "dashboard.html" : "index.html";
        }
    }

    function verifyOTP() {
        alert("Hesab təsdiqləndi!");
        window.location.href = (currentRole === 'seller') ? "dashboard.html" : "index.html";
    }
</script>
</body>
</html>
