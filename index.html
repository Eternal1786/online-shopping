<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eternal Global Network | Next-Gen Dropshipping</title>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
<style>
:root { --blue:#3b82f6; --bg:#020617; --card:#0f172a; --border:#1e293b; --text:#f8fafc; }
body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
nav{background:rgba(15,23,42,0.9);backdrop-filter:blur(12px);padding:1rem 5%;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1000;}
.logo{font-size:1.5rem;font-weight:800;color:var(--blue);text-decoration:none;letter-spacing:2px;}
.nav-right{display:flex;gap:10px;align-items:center;}
.btn{padding:10px 20px;border-radius:8px;font-weight:600;cursor:pointer;border:none;transition:0.3s;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
.btn-outline{background:transparent;color:white;border:1px solid var(--border);}
.btn-primary{background:var(--blue);color:white;}
.btn-google{background:white;color:#000;width:100%;margin-top:10px;}
.hero{height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 20px;background:radial-gradient(circle at center, rgba(59,130,246,0.1), transparent 70%);}
.hero h1{font-size:3.5rem;margin-bottom:15px;background:linear-gradient(to right,#3b82f6,#93c5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:2000;align-items:center;justify-content:center;padding:20px;}
.modal-content{background:var(--card);width:100%;max-width:450px;padding:2rem;border-radius:24px;border:1px solid var(--border);position:relative;max-height:90vh;overflow-y:auto;}
.input-group{margin-bottom:1rem;position:relative;}
label{display:block;font-size:0.8rem;color:#94a3b8;margin-bottom:5px;}
input,select{width:100%;padding:12px;background:#020617;border:1px solid var(--border);border-radius:10px;color:white;box-sizing:border-box;}
.eye-btn{position:absolute;right:12px;top:32px;cursor:pointer;font-size:1.2rem;}
#recaptcha-container{margin:10px 0;}
</style>
</head>
<body>

<nav>
<a href="#" class="logo">ETERNAL</a>
<div class="nav-right">
    <select id="langSelect" onchange="changeLang(this.value)" style="background:#1e293b;color:white;border:none;padding:5px;border-radius:5px;">
        <option value="en">EN</option><option value="az">AZ</option><option value="tr">TR</option>
        <option value="ru">RU</option><option value="zh">CN</option><option value="ar">AR</option>
    </select>
    <button class="btn btn-outline" id="navLogin" onclick="openModal('login')">Login</button>
    <button class="btn btn-primary" id="navSignup" onclick="openModal('signup')">Join Now</button>
</div>
</nav>

<section class="hero">
<h1 id="hTitle">Global Dropshipping <br> Future is Eternal</h1>
<p id="hDesc" style="color:#94a3b8; max-width:600px; margin-bottom:30px;">Expand your business across borders with AI-driven network.</p>
<button class="btn btn-primary" id="heroBtn" onclick="openModal('signup')" style="padding:15px 40px;">Get Started</button>
</section>

<div id="authModal" class="modal">
<div class="modal-content">
    <span onclick="closeModal()" style="position:absolute;right:20px;top:15px;cursor:pointer;font-size:24px;">&times;</span>
    <h2 id="mTitle" style="text-align:center;">Account</h2>
    <div id="formBody"></div>
    <div id="recaptcha-container"></div>
    <button class="btn btn-primary" id="mActionBtn" style="width:100%; margin-top:15px;" onclick="mainAuth()">Continue</button>
    <div style="text-align:center; margin:15px 0; color:#475569;">OR</div>
    <button class="btn btn-google" onclick="googleLogin()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google Login
    </button>
</div>
</div>

<script>
// ==== Firebase Konfiqurasiyası ====
// Buraya öz Firebase açarlarını əlavə et
const firebaseConfig = {
    apiKey: "AIzaSyC9KKiQYm-yB2w5qaNVlM6J5EZFtasKAAQ",
    authDomain: "eternal-global.firebaseapp.com",
    projectId: "eternal-global",
    storageBucket: "eternal-global.appspot.com",
    messagingSenderId: "1028365979555",
    appId: "1:1028365979555:web:ff7100da1ed4c9d66ad416"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ==== Dil dəstəyi ====
const langData = {
    en: { hTitle: "Global Dropshipping <br> Future is Eternal", hDesc: "Expand your business across borders.", login: "Login", signup: "Join Now", heroBtn: "Get Started", email: "Email", pass: "Password", name: "Full Name", phone: "Phone (+994...)", forgot: "Forgot Password?", role: "Account Type", seller: "Seller", buyer: "Buyer" },
    az: { hTitle: "Qlobal Dropshipping <br> Gələcək Eternal-dadır", hDesc: "Sərhədləri aşaraq biznesinizi bizimlə böyüdün.", login: "Giriş", signup: "Qeydiyyat", heroBtn: "Başla", email: "Gmail", pass: "Şifrə", name: "Ad Soyad", phone: "Telefon (+994...)", forgot: "Şifrəni unutmusan?", role: "Rütbə", seller: "Satıcı", buyer: "Alıcı" },
    tr: { hTitle: "Küresel Dropshipping <br> Gelecek Eternal'da", hDesc: "İşinizi sınırların ötesine taşıyın.", login: "Giriş", signup: "Kayıt Ol", heroBtn: "Başla", email: "E-posta", pass: "Şifre", name: "Ad Soyad", phone: "Telefon (+90...)", forgot: "Şifremi unuttum?", role: "Hesap Türü", seller: "Satıcı", buyer: "Alıcı" },
    ru: { hTitle: "Глобальный дропшиппинг <br> Будущее за Eternal", hDesc: "Расширяйте свой бизнес за границей.", login: "Вход", signup: "Регистрация", heroBtn: "Начать", email: "Почта", pass: "Пароль", name: "ФИО", phone: "Телефон", forgot: "Забыли пароль?", role: "Роль", seller: "Продавец", buyer: "Покупатель" },
    ar: { hTitle: "دروبشيبينغ عالمي <br> المستقبل مع إتيرنال", hDesc: "وسع أعمالك عبر الحدود.", login: "دخول", signup: "انضمام", heroBtn: "ابدأ الآن", email: "بريد", pass: "كلمة السر", name: "الاسم", phone: "هاتف", forgot: "نسيت؟", role: "دور", seller: "بائع", buyer: "مشتري" },
    zh: { hTitle: "全球代发货 <br> 未来在于 Eternal", hDesc: "跨越国界扩展您的业务。", login: "登录", signup: "注册", heroBtn: "开始", email: "电子邮件", pass: "密码", name: "姓名", phone: "电话", forgot: "忘记密码?", role: "角色", seller: "卖家", buyer: "买家" }
};

let curLang = "en";
let currentMode = "login";
let confirmResult = null;

// ==== Funksiyalar ====
function changeLang(lang) {
    curLang = lang;
    const t = langData[lang];
    document.getElementById('hTitle').innerHTML = t.hTitle;
    document.getElementById('hDesc').innerText = t.hDesc;
    document.getElementById('navLogin').innerText = t.login;
    document.getElementById('navSignup').innerText = t.signup;
    document.getElementById('heroBtn').innerText = t.heroBtn;
    if(document.getElementById('authModal').style.display === 'flex') renderForm();
}

function openModal(mode) {
    currentMode = mode;
    document.getElementById('authModal').style.display = 'flex';
    renderForm();
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {size: 'invisible'});
}

function closeModal() { document.getElementById('authModal').style.display = 'none'; }

function renderForm() {
    const t = langData[curLang];
    const body = document.getElementById('formBody');
    document.getElementById('mTitle').innerText = currentMode === 'login' ? t.login : t.signup;
    
    if(currentMode === 'login') {
        body.innerHTML = `
            <div class="input-group"><label>${t.email}</label><input type="email" id="m_email"></div>
            <div class="input-group"><label>${t.pass}</label><input type="password" id="m_pass"><span class="eye-btn" onclick="togglePass()">👁️</span></div>
            <p onclick="handleForgot()" style="color:var(--blue); cursor:pointer; font-size:0.8rem;">${t.forgot}</p>`;
    } else {
        body.innerHTML = `
            <div class="input-group"><label>${t.name}</label><input type="text" id="m_name"></div>
            <div class="input-group"><label>${t.phone}</label><input type="text" id="m_phone"></div>
            <div class="input-group"><label>${t.role}</label><select id="m_role"><option value="seller">${t.seller}</option><option value="buyer">${t.buyer}</option></select></div>
            <div class="input-group"><label>${t.email}</label><input type="email" id="m_email"></div>
            <div class="input-group"><label>${t.pass}</label><input type="password" id="m_pass"></div>`;
    }
}

function togglePass() {
    const p = document.getElementById('m_pass');
    p.type = p.type === 'password' ? 'text' : 'password';
}

// ==== AUTH LOGIC ====
async function mainAuth() {
    const email = document.getElementById('m_email').value;
    const pass = document.getElementById('m_pass').value;

    if(currentMode === 'login') {
        auth.signInWithEmailAndPassword(email, pass)
            .then(res => { saveOffline(res.user); window.location.href="dashboard.html"; })
            .catch(e => alert(e.message));
    } else {
        const phone = document.getElementById('m_phone').value;
        auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
            .then(res => {
                confirmResult = res;
                const code = prompt("Enter 6-digit SMS code:");
                return confirmResult.confirm(code);
            })
            .then(result => {
                return auth.createUserWithEmailAndPassword(email, pass);
            })
            .then(res => {
                db.collection("users").doc(res.user.uid).set({
                    fullname: document.getElementById('m_name').value,
                    email: email,
                    phone: document.getElementById('m_phone').value,
                    role: document.getElementById('m_role').value,
                    vip: false,
                    offline: false
                });
                window.location.href="dashboard.html";
            })
            .catch(e => alert("Error: " + e.message));
    }
}

function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).then(res => {
        db.collection("users").doc(res.user.uid).set({
            fullname: res.user.displayName,
            email: res.user.email,
            vip: false
        }, {merge: true});
        window.location.href="dashboard.html";
    });
}

function handleForgot() {
    const email = prompt("Enter your email:");
    if(email) auth.sendPasswordResetEmail(email).then(() => alert("Reset link sent!"));
}

function saveOffline(user) {
    localStorage.setItem('eternal_user', JSON.stringify({uid: user.uid, email: user.email, lastLogin: Date.now()}));
}

window.onload = () => {
    if(!navigator.onLine) {
        const local = localStorage.getItem('eternal_user');
        if(local) console.log("Offline mode active for:", JSON.parse(local).email);
    }
};
</script>

</body>
</html>
