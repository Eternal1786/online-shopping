<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal | Global Dropshipping Network</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        :root { --blue: #3b82f6; --bg: #020617; --card: #0f172a; --border: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.5; }
        nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--blue); text-decoration: none; }
        .nav-right { display: flex; gap: 10px; align-items: center; }
        .btn { padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: 0.3s; }
        .btn-outline { background: transparent; color: white; border: 1px solid var(--blue); }
        .btn-primary { background: var(--blue); color: white; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        .modal-content { background: var(--card); width: 100%; max-width: 450px; padding: 2rem; border-radius: 20px; border: 1px solid var(--border); position: relative; }
        .input-group { margin-bottom: 1rem; text-align: left; position: relative; }
        label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; background: #020617; border: 1px solid var(--border); border-radius: 10px; color: white; box-sizing: border-box; }
        .eye-btn { position: absolute; right: 12px; top: 32px; cursor: pointer; }
        .submit-btn { width: 100%; padding: 14px; background: var(--blue); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .footer-link { font-size: 0.8rem; color: var(--blue); cursor: pointer; text-decoration: none; display: block; margin-top: 5px; text-align: right; }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">ETERNAL</a>
    <div class="nav-right">
        <select onchange="updateLanguage(this.value)" style="background:#0f172a; color:white; border:1px solid #1e293b; border-radius:5px;">
            <option value="en">EN</option><option value="az">AZ</option><option value="tr">TR</option>
            <option value="ru">RU</option><option value="zh">CN</option><option value="ar">AR</option>
        </select>
        <button class="btn btn-outline" id="navLogin" onclick="openModal('login')">Login</button>
        <button class="btn btn-primary" id="navSignup" onclick="openModal('signup')">Join Now</button>
    </div>
</nav>

<div id="authModal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal()" style="position:absolute; right:20px; top:10px; cursor:pointer; font-size:24px;">&times;</span>
        <h2 id="mTitle">Account</h2>
        <div id="formBody"></div>
        <button class="submit-btn" onclick="handleSubmit()" id="mActionBtn">Continue</button>
    </div>
</div>

<script>
    // 1. Firebase (Sənin məlumatların)
    const firebaseConfig = {
        apiKey: "AIzaSyB_ZF8CnMf3-4sLhgKiTkf3InJN_TDRhLM",
        authDomain: "eternal-global.firebaseapp.com",
        projectId: "sonsuz-kuresel",
        appId: "1:1028365979555:web:ff7100da1ed4c9d66ad416"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // 2. 7 DİL DESTEGİ
    const langData = {
        en: { login: "Login", signup: "Join Now", email: "Email", pass: "Password", name: "Full Name", country: "Country", city: "City", gender: "Gender", dob: "DOB", role: "Role", seller: "Seller", buyer: "Buyer", forgot: "Forgot Password?", male: "Male", female: "Female", welcome: "Welcome!" },
        az: { login: "Giriş", signup: "Qeydiyyat", email: "Gmail", pass: "Şifrə", name: "Ad Soyad", country: "Ölkə", city: "Şəhər", gender: "Cinsiyyət", dob: "Doğum Tarixi", role: "Rütbə", seller: "Satıcı", buyer: "Alıcı", forgot: "Şifrəni unutmusan?", male: "Kişi", female: "Qadın", welcome: "Xoş gəldiniz!" },
        tr: { login: "Giriş", signup: "Kayıt Ol", email: "E-posta", pass: "Şifre", name: "Ad Soyad", country: "Ülke", city: "Şehir", gender: "Cinsiyet", dob: "Doğum Tarihi", role: "Rol", seller: "Satıcı", buyer: "Alıcı", forgot: "Şifremi unuttum?", male: "Erkek", female: "Kadın", welcome: "Hoş geldiniz!" },
        ru: { login: "Вход", signup: "Регистрация", email: "Почта", pass: "Пароль", name: "ФИО", country: "Страна", city: "Город", gender: "Пол", dob: "Дата рожд.", role: "Роль", seller: "Продавец", buyer: "Покупатель", forgot: "Забыли пароль?", male: "Муж", female: "Жен", welcome: "Добро пожаловать!" },
        zh: { login: "登录", signup: "注册", email: "电子邮件", pass: "密码", name: "全名", country: "国家", city: "城市", gender: "性别", dob: "生日", role: "角色", seller: "卖家", buyer: "买家", forgot: "忘记密码?", male: "男", female: "女", welcome: "欢迎！" },
        ar: { login: "تسجيل الدخول", signup: "انضم الآن", email: "بريد", pass: "كلمة السر", name: "الاسم", country: "بلد", city: "مدينة", gender: "جنس", dob: "ميلاد", role: "دور", seller: "بائع", buyer: "مشتري", forgot: "نسيت كلمة السر؟", male: "ذكر", female: "أنثى", welcome: "أهلاً بك" }
    };

    let curLang = 'en';
    let currentMode = 'login';

    function updateLanguage(val) {
        curLang = val;
        document.getElementById('navLogin').innerText = langData[val].login;
        document.getElementById('navSignup').innerText = langData[val].signup;
        if (document.getElementById('authModal').style.display === 'flex') renderForm();
    }

    function openModal(mode) {
        currentMode = mode;
        document.getElementById('authModal').style.display = 'flex';
        renderForm();
    }

    function closeModal() { document.getElementById('authModal').style.display = 'none'; }

    function togglePass() {
        const p = document.getElementById('l_pass');
        p.type = p.type === "password" ? "text" : "password";
    }

    function renderForm() {
        const t = langData[curLang];
        const body = document.getElementById('formBody');
        document.getElementById('mTitle').innerText = currentMode === 'login' ? t.login : t.signup;
        document.getElementById('mActionBtn').innerText = currentMode === 'login' ? t.login : t.signup;

        if (currentMode === 'login') {
            body.innerHTML = `
                <div class="input-group"><label>${t.email}</label><input type="email" id="l_email"></div>
                <div class="input-group"><label>${t.pass}</label><input type="password" id="l_pass">
                <span class="eye-btn" onclick="togglePass()">👁️</span></div>
                <a class="footer-link" onclick="handleForgot()">${t.forgot}</a>`;
        } else {
            body.innerHTML = `
                <div class="input-group"><label>${t.name}</label><input type="text" id="l_name"></div>
                <div class="grid">
                    <div class="input-group"><label>${t.country}</label><input type="text" id="l_country"></div>
                    <div class="input-group"><label>${t.city}</label><input type="text" id="l_city"></div>
                </div>
                <div class="grid">
                    <div class="input-group"><label>${t.gender}</label><select id="l_gender"><option value="m">${t.male}</option><option value="f">${t.female}</option></select></div>
                    <div class="input-group"><label>${t.dob}</label><input type="date" id="l_dob"></div>
                </div>
                <div class="input-group"><label>${t.role}</label><select id="l_role"><option value="buyer">${t.buyer}</option><option value="seller">${t.seller}</option></select></div>
                <div class="input-group"><label>${t.email}</label><input type="email" id="l_email"></div>
                <div class="input-group"><label>${t.pass}</label><input type="password" id="l_pass"><span class="eye-btn" onclick="togglePass()">👁️</span></div>`;
        }
    }

    function handleSubmit() {
        const email = document.getElementById('l_email').value;
        const pass = document.getElementById('l_pass').value;
        if (!email || !pass) return alert("Xanaları doldurun!");

        if (currentMode === 'login') {
            auth.signInWithEmailAndPassword(email, pass).then(() => { alert(langData[curLang].welcome); closeModal(); }).catch(e => alert(e.message));
        } else {
            auth.createUserWithEmailAndPassword(email, pass).then(() => { alert(langData[curLang].welcome); closeModal(); }).catch(e => alert(e.message));
        }
    }

    function handleForgot() {
        const email = prompt("Emailinizi daxil edin:");
        if (email) auth.sendPasswordResetEmail(email).then(() => alert("Şifrə sıfırlama linki göndərildi!")).catch(e => alert(e.message));
    }
</script>
</body>
</html>
